# Child Spree — Cloudflare Pages config
name = "childspree"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# D1 Database — run `npm run db:create` then paste the ID here
[[d1_databases]]
binding = "DB"
database_name = "childspree-db"
database_id = "5091ef2f-c4bc-4759-872f-1828fde2ec18"

# R2 Bucket — for parent video uploads
[[r2_buckets]]
binding = "VIDEOS"
bucket_name = "childspree-videos"

# Auth secret for admin routes
[vars]
# Auth is handled by Microsoft SSO + server-side sessions
# No secrets in this file — use Cloudflare Pages encrypted env vars
