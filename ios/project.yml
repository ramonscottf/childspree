name: ChildSpree
options:
  bundleIdPrefix: org.daviskids
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: "YES"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
packages:
  MSAL:
    url: https://github.com/AzureAD/microsoft-authentication-library-for-objc
    from: "1.3.0"
targets:
  ChildSpree:
    type: application
    platform: iOS
    sources:
      - path: ChildSpree
    resources:
      - path: ChildSpree/Resources
      - path: ChildSpree/Assets.xcassets
    dependencies:
      - package: MSAL
        product: MSAL
    info:
      path: ChildSpree/Info.plist
      properties:
        CFBundleDisplayName: Child Spree
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: Navy
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: Record a short video so volunteers can personalize shopping for your child.
        NSMicrophoneUsageDescription: Record audio with your child's video message.
        NSPhotoLibraryUsageDescription: Select an existing video to upload instead of recording.
        UIAppFonts:
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-SemiBold.ttf
          - DMSans-Bold.ttf
          - DMSans-ExtraBold.ttf
          - PlayfairDisplay-SemiBold.ttf
          - PlayfairDisplay-Bold.ttf
          - PlayfairDisplay-ExtraBold.ttf
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - childspree
              - msauth.org.daviskids.childspree
        LSApplicationQueriesSchemes:
          - msauthv2
          - msauthv3
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.daviskids.childspree
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
  ChildSpreeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChildSpreeTests
    dependencies:
      - target: ChildSpree
